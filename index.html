<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARBOHA TECH | Pro Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root { --apple-blue: #0071e3; --gold: #D4AF37; }
    body { font-family: 'Montserrat', sans-serif; background: #ffffff; color: #1d1d1f; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }

    /* Transitions */
    .view { display: none; width: 100%; min-height: 100vh; animation: iosScale 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .view.active { display: block !important; }
    @keyframes iosScale { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    /* Glass Navbar */
    .apple-nav { 
      background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px) saturate(180%); 
      border-bottom: 1px solid rgba(0,0,0,0.05); position: fixed; top: 0; width: 100%; z-index: 1000; height: 55px; 
    }

    /* Sidebar (Playlist) - اليسار */
    #sidebar {
      position: fixed; top: 0; left: 0; width: 300px; height: 100%; 
      background: white; z-index: 4000; transform: translateX(-100%);
      transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 20px 0 60px rgba(0,0,0,0.1); padding: 40px;
    }
    #sidebar.open { transform: translateX(0); }

    /* Cart Drawer (السلة الجانبية) - اليمين */
    #cart-drawer {
      position: fixed; top: 0; right: 0; width: 350px; height: 100%; 
      background: white; z-index: 4000; transform: translateX(100%);
      transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -20px 0 60px rgba(0,0,0,0.1); display: flex; flex-direction: column;
    }
    #cart-drawer.open { transform: translateX(0); }
    
    @media (max-width: 400px) { #cart-drawer { width: 100%; } }

    /* Overlay (الخلفية المظلمة عند فتح القوائم) */
    .global-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
      z-index: 3500; display: none; opacity: 0; transition: 0.3s;
    }
    .global-overlay.active { display: block; opacity: 1; }

    /* Product Cards */
    .p-card {
      background: #fff; border-radius: 30px; padding: 20px; transition: 0.5s;
      border: 1px solid #f8f8f8; cursor: pointer; position: relative;
    }
    .p-card:hover { transform: translateY(-10px); border-color: var(--apple-blue); box-shadow: 0 30px 60px rgba(0,0,0,0.05); }

    .btn-apple { background: var(--apple-blue); color: white; border-radius: 50px; padding: 14px 40px; font-weight: 700; transition: 0.3s; }
    
    /* Notification */
    #notification { position: fixed; top: 70px; right: 20px; background: #000; color: white; padding: 15px 25px; border-radius: 20px; z-index: 5000; display: none; animation: slideIn 0.4s ease; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
</head>
<body>

  <div id="notification" class="font-bold text-sm">Ajouté avec succès ! ✅</div>

  <div class="global-overlay" id="overlay" onclick="closeAll()"></div>

  <div id="sidebar">
    <div class="flex justify-between items-center mb-16">
        <h3 class="font-black italic text-xl text-blue-600">PLAYLIST</h3>
        <button onclick="closeAll()" class="text-3xl text-gray-300">&times;</button>
    </div>
    <nav class="flex flex-col gap-8 text-left">
        <button onclick="go('home-view'); closeAll()" class="font-bold uppercase text-[11px] tracking-[0.3em] hover:text-blue-600">01. Accueil</button>
        <button onclick="go('support-view'); closeAll()" class="font-bold uppercase text-[11px] tracking-[0.3em] hover:text-blue-600">02. Support</button>
        <div class="h-[1px] bg-gray-100 my-4"></div>
        <a href="https://wa.me/212771737049" class="font-bold text-sm text-green-500">WhatsApp Direct</a>
    </nav>
  </div>

  <div id="cart-drawer">
    <div class="p-8 flex justify-between items-center border-b">
        <h3 class="font-black italic text-xl">MON PANIER</h3>
        <button onclick="closeAll()" class="text-4xl text-gray-200">&times;</button>
    </div>
    
    <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6">
        <p class="text-center text-gray-400 mt-10">Votre sac est vide.</p>
    </div>

    <div class="p-8 border-t bg-gray-50">
        <div class="flex justify-between items-center mb-6">
            <span class="font-bold text-gray-400">TOTAL</span>
            <span id="total-price" class="text-2xl font-black text-blue-600">0 DH</span>
        </div>
        <button onclick="checkout()" class="w-full py-5 btn-apple text-xs font-black uppercase tracking-widest shadow-xl">Commander (WhatsApp)</button>
    </div>
  </div>

  <nav class="apple-nav">
    <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
      <button onclick="toggleSidebar(true)" class="p-2">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="5" cy="12" r="1.5"/></svg>
      </button>

      <div onclick="go('home-view')" class="flex items-center gap-2 cursor-pointer absolute left-1/2 -translate-x-1/2">
        <div class="bg-black text-white px-2 py-1 rounded font-black text-[10px]">MT</div>
        <span class="text-xs font-black italic uppercase tracking-tighter">MARBOHA <span class="text-blue-600">TECH</span></span>
      </div>

      <button onclick="toggleCart(true)" class="relative p-2">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span id="badge" class="absolute -top-1 -right-1 bg-red-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center hidden font-bold">0</span>
      </button>
    </div>
  </nav>

  <div id="home-view" class="view active">
    <section class="h-[75vh] flex flex-col justify-center items-center text-center px-6 bg-[#fbfbfd] relative overflow-hidden pt-12">
      <div class="absolute inset-0 opacity-40">
          <img src="https://i.ibb.co/XfXkYmN/hero-watch-earbuds.jpg" class="w-full h-full object-cover">
      </div>
      <div class="relative z-10">
          <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter mb-4 text-gray-900">MARBOHA</h1>
          <p class="text-blue-600 font-bold text-xs tracking-[0.8em] mb-12 uppercase">Samsung Pro Store</p>
          <button onclick="document.getElementById('store').scrollIntoView()" class="btn-apple px-16 shadow-2xl">VOIR LES PRODUITS</button>
      </div>
    </section>

    <div id="store" class="max-w-7xl mx-auto py-24 px-6">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
    </div>
  </div>

  <div id="details-view" class="view pt-24 px-6 bg-[#f5f5f7]">
    <div class="max-w-6xl mx-auto bg-white p-10 md:p-16 rounded-[50px] shadow-2xl flex flex-col md:flex-row gap-16 items-center border border-gray-100">
      <div class="md:w-1/2 bg-gray-50 rounded-[40px] p-8 text-center">
          <img id="p-img" src="" class="w-full h-80 object-contain mx-auto">
      </div>
      <div class="md:w-1/2 text-left">
        <button onclick="go('home-view')" class="text-gray-400 font-bold text-[10px] mb-8 block uppercase tracking-widest">← Boutique</button>
        <h2 id="p-name" class="text-4xl font-black mb-6 italic uppercase tracking-tighter text-gray-900"></h2>
        <p id="p-desc" class="text-gray-400 text-lg mb-12 font-medium leading-relaxed"></p>
        <div id="p-price" class="text-6xl font-black text-blue-600 block mb-12 italic"></div>
        <button id="add-btn" class="btn-apple w-full py-6 text-sm uppercase">AJOUTER AU PANIER</button>
      </div>
    </div>
  </div>

  <div id="support-view" class="view pt-24 px-6">
    <div class="max-w-4xl mx-auto text-center">
        <h2 class="text-6xl font-black italic uppercase mb-20 tracking-tighter">Contact.</h2>
        <form id="contact-form" class="bg-gray-50 p-10 md:p-16 rounded-[60px] text-left space-y-6 max-w-2xl mx-auto">
            <input type="hidden" name="access_key" value="83029047-dab7-46d7-a0fa-cde6ca83dd8b">
            <input type="text" name="name" placeholder="Nom" required class="w-full p-5 rounded-2xl bg-white border-none outline-none ring-1 ring-gray-100">
            <input type="email" name="email" placeholder="Email" required class="w-full p-5 rounded-2xl bg-white border-none outline-none ring-1 ring-gray-100">
            <textarea name="message" placeholder="Votre message..." rows="5" required class="w-full p-5 rounded-2xl bg-white border-none outline-none ring-1 ring-gray-100 resize-none"></textarea>
            <button type="submit" class="btn-apple w-full py-6 font-black uppercase">Envoyer le message</button>
            <p id="form-log" class="text-center font-bold text-xs text-blue-600 mt-4"></p>
        </form>
    </div>
  </div>

  <script>
    const productsDB = [
      { id: 1, name: "Samsung 65W Trio", price: 75, img: "https://i.ibb.co/Xz9R7xY/white65w.jpg", desc: "Chargeur original 65W PD avec 3 ports. Charge ultra rapide pour PC et Mobile." },
      { id: 2, name: "Samsung 25W White", price: 50, img: "https://i.ibb.co/YyYhXzQ/white25w.jpg", desc: "Chargeur mural 25W original Samsung. Technologie Super Fast Charging." },
      { id: 3, name: "Earbuds Crystal Pink", price: 95, img: "https://i.ibb.co/fNb9V1L/pinkearbuds.jpg", desc: "Design cristal exclusif, son HD et boîtier transparent." },
      { id: 4, name: "Samsung 25W Black", price: 50, img: "https://i.ibb.co/Xv9C63XF/samsung-25w-black.png", desc: "Version Noir Classique du chargeur 25W Samsung." }
    ];

    let cart = [];

    function go(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // التحكم في القائمة الجانبية والسلة
    function toggleSidebar(s) { 
        document.getElementById('sidebar').classList.toggle('open', s);
        document.getElementById('overlay').classList.toggle('active', s);
    }

    function toggleCart(s) { 
        document.getElementById('cart-drawer').classList.toggle('open', s);
        document.getElementById('overlay').classList.toggle('active', s);
    }

    function closeAll() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('cart-drawer').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
    }

    function render() {
      document.getElementById('products-grid').innerHTML = productsDB.map(p => `
        <div class="p-card" onclick="showP(${p.id})">
          <div class="absolute top-4 right-4 bg-black text-white px-3 py-1 rounded-full text-[10px] font-black">${p.price} DH</div>
          <img src="${p.img}" class="w-full h-48 object-contain mb-6">
          <h3 class="font-black text-[11px] uppercase italic text-center">${p.name}</h3>
        </div>`).join('');
    }

    function showP(id) {
      const p = productsDB.find(x => x.id === id);
      document.getElementById('p-name').innerText = p.name;
      document.getElementById('p-desc').innerText = p.desc;
      document.getElementById('p-price').innerText = p.price + " DH";
      document.getElementById('p-img').src = p.img;
      document.getElementById('add-btn').onclick = () => addToCart(id);
      go('details-view');
    }

    function addToCart(id) {
      const p = productsDB.find(x => x.id === id);
      cart.push(p);
      updateCart();
      const n = document.getElementById('notification');
      n.style.display = 'block';
      setTimeout(() => n.style.display = 'none', 2000);
      toggleCart(true); // فتح السلة تلقائياً عند الإضافة
    }

    function updateCart() {
      document.getElementById('badge').innerText = cart.length;
      document.getElementById('badge').classList.toggle('hidden', cart.length === 0);
      document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.price, 0) + " DH";
      
      const container = document.getElementById('cart-items');
      if(cart.length === 0) {
          container.innerHTML = '<p class="text-center text-gray-400 mt-10">Votre sac est vide.</p>';
          return;
      }

      container.innerHTML = cart.map((item, idx) => `
        <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-3xl border border-gray-100">
          <img src="${item.img}" class="w-16 h-16 object-contain bg-white rounded-2xl">
          <div class="flex-1">
              <div class="font-black text-[10px] uppercase italic leading-tight">${item.name}</div>
              <div class="text-blue-600 font-bold text-xs mt-1">${item.price} DH</div>
          </div>
          <button onclick="cart.splice(${idx}, 1); updateCart();" class="text-red-500 font-bold text-2xl px-2">&times;</button>
        </div>`).join('');
    }

    function checkout() {
      if(cart.length === 0) return;
      const msg = encodeURIComponent(`Bonjour MARBOHA TECH, commande :\n` + cart.map(i => `- ${i.name}`).join('\n') + `\n\nTotal: ${document.getElementById('total-price').innerText}`);
      window.open(`https://wa.me/212771737049?text=${msg}`);
    }

    document.getElementById('contact-form').onsubmit = function(e) {
      e.preventDefault();
      document.getElementById('form-log').innerText = "ENVOI...";
      fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(this) })
      .then(r => r.json()).then(d => { if(d.success) { document.getElementById('form-log').innerText = "ENVOYÉ ✅"; this.reset(); } });
    };

    window.onload = render;
  </script>
</body>
</html>
