<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARBOHA TECH | Ultra Edition 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root { --apple-blue: #0071e3; --tech-orange: #ff6b00; }
    body { font-family: 'Montserrat', sans-serif; background: #ffffff; color: #1d1d1f; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }

    /* Animations */
    .view { display: none; width: 100%; min-height: 100vh; animation: appleSlide 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .view.active { display: block !important; }
    @keyframes appleSlide { from { opacity: 0; transform: scale(0.98) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    /* Top Banner - Flash Sale */
    .top-banner { background: black; color: white; text-align: center; padding: 8px; font-size: 10px; font-weight: 700; letter-spacing: 1px; }

    /* Apple Nav */
    .apple-nav { 
      background: rgba(255, 255, 255, 0.8); backdrop-filter: saturate(180%) blur(20px); 
      border-bottom: 1px solid rgba(0,0,0,0.05); position: fixed; top: 30px; width: 100%; z-index: 1000; height: 50px; 
    }

    /* Sidebar Playlist */
    #sidebar {
      position: fixed; top: 0; left: 0; width: 300px; height: 100%; 
      background: white; z-index: 3000; transform: translateX(-100%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 20px 0 50px rgba(0,0,0,0.1); padding: 40px;
    }
    #sidebar.open { transform: translateX(0); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 2500; display: none; }
    .overlay.active { display: block; }

    /* Product Cards Zoom Effect */
    .product-card img { transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .product-card:hover img { transform: scale(1.1); }

    /* Notification Toast */
    #toast {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
      background: #000; color: white; padding: 12px 25px; border-radius: 50px;
      font-size: 12px; font-weight: 700; z-index: 5000; display: none; animation: popUp 0.4s ease forwards;
    }
    @keyframes popUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

    .btn-apple { background: var(--apple-blue); color: white; border-radius: 50px; padding: 12px 30px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-apple:active { transform: scale(0.95); }
    
    #search-bar { transition: 0.3s; border-radius: 12px; background: #f5f5f7; border: none; padding: 10px 20px; outline: none; }
    #search-bar:focus { width: 250px; box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }
  </style>
</head>
<body>

  <div class="top-banner fixed w-full top-0 z-[1100]">
    LIVRAISON GRATUITE SUR TOUT LE MAROC AUJOURD'HUI 🚚
  </div>

  <div id="toast">Produit ajouté au panier ! 🛍️</div>

  <div class="overlay" onclick="toggleSidebar(false)"></div>
  <div id="sidebar">
    <h3 class="font-black italic text-xl text-blue-600 mb-12">Playlist</h3>
    <nav class="flex flex-col gap-8">
        <button onclick="go('home-view'); toggleSidebar(false)" class="text-left font-bold uppercase text-xs tracking-widest hover:text-blue-600 transition">🏠 Accueil</button>
        <button onclick="go('support-view'); toggleSidebar(false)" class="text-left font-bold uppercase text-xs tracking-widest hover:text-blue-600 transition">🛠️ Support</button>
        <div class="h-[1px] bg-gray-100 my-4"></div>
        <a href="https://wa.me/212771737049" class="text-green-500 font-bold text-sm">WhatsApp Direct</a>
    </nav>
  </div>

  <nav class="apple-nav">
    <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
      <button onclick="toggleSidebar(true)" class="p-2">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="5" cy="12" r="1.5"/></svg>
      </button>

      <div onclick="go('home-view')" class="flex items-center gap-2 cursor-pointer">
        <div class="bg-black text-white px-2 py-1 rounded font-black text-xs">MT</div>
        <span class="text-xs font-black italic uppercase">MARBOHA <span class="text-blue-600">TECH</span></span>
      </div>

      <button onclick="toggleCart(true)" class="relative p-2">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span id="badge" class="absolute -top-1 -right-1 bg-red-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center hidden font-bold">0</span>
      </button>
    </div>
  </nav>

  <div id="home-view" class="view active">
    <section class="h-[70vh] flex flex-col justify-center items-center text-center px-6 pt-20 bg-[#fbfbfd]">
      <h1 class="font-black italic text-5xl md:text-8xl tracking-tighter mb-4">MARBOHA TECH</h1>
      <p class="text-gray-400 font-bold text-xs tracking-[0.5em] mb-12">NEXT GEN SAMSUNG ECOSYSTEM</p>
      
      <input type="text" id="search-bar" placeholder="Rechercher un produit..." onkeyup="search()">
    </section>

    <div id="store" class="max-w-7xl mx-auto py-24 px-6">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
    </div>
  </div>

  <div id="details-view" class="view pt-32 px-6">
    <div class="max-w-6xl mx-auto bg-white p-10 rounded-[50px] shadow-2xl flex flex-col md:flex-row gap-16 items-center border">
      <div class="md:w-1/2 overflow-hidden rounded-3xl">
          <img id="p-img" src="" class="w-full h-96 object-contain transform hover:scale-110 transition duration-700">
      </div>
      <div class="md:w-1/2 text-left">
        <button onclick="go('home-view')" class="text-blue-600 font-bold text-xs mb-8 uppercase">← Retour au shop</button>
        <h2 id="p-name" class="text-4xl font-black mb-4 italic uppercase"></h2>
        <p id="p-desc" class="text-gray-400 mb-10 leading-relaxed"></p>
        <span id="p-price" class="text-6xl font-black text-blue-600 italic block mb-12"></span>
        <button id="add-btn" class="btn-apple w-full py-5 shadow-xl uppercase">Ajouter au Sac</button>
      </div>
    </div>
  </div>

  <div id="support-view" class="view pt-32 px-6">
    <div class="max-w-4xl mx-auto text-center">
        <h2 class="text-5xl font-black italic uppercase mb-16 tracking-tighter">Support</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <a href="https://wa.me/212771737049" class="p-10 bg-green-50 rounded-[40px] border border-green-100 flex flex-col items-center gap-4 hover:scale-105 transition">
                <span class="text-4xl">💬</span><span class="font-black text-xs uppercase">WhatsApp</span>
            </a>
            <a href="https://instagram.com/shop._.maroc7" class="p-10 bg-purple-50 rounded-[40px] border border-purple-100 flex flex-col items-center gap-4 hover:scale-105 transition">
                <span class="text-4xl">📸</span><span class="font-black text-xs uppercase">Instagram</span>
            </a>
        </div>
        <form id="contact-form" class="bg-gray-50 p-12 rounded-[50px] border text-left space-y-4 max-w-xl mx-auto shadow-inner">
            <input type="hidden" name="access_key" value="83029047-dab7-46d7-a0fa-cde6ca83dd8b">
            <input type="text" name="name" placeholder="Votre Nom" required class="w-full p-4 rounded-2xl border-none ring-1 ring-gray-200 outline-none focus:ring-blue-500">
            <input type="email" name="email" placeholder="Email" required class="w-full p-4 rounded-2xl border-none ring-1 ring-gray-200 outline-none focus:ring-blue-500">
            <textarea name="message" placeholder="Votre message..." rows="4" required class="w-full p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-blue-500 resize-none"></textarea>
            <button type="submit" class="btn-apple w-full py-5 font-black uppercase">Envoyer</button>
            <p id="form-log" class="text-center font-bold text-blue-600 text-xs mt-4"></p>
        </form>
    </div>
  </div>

  <script>
    const productsDB = [
      { id: 1, name: "Samsung 65W Trio", price: 75, img: "https://i.ibb.co/Xz9R7xY/white65w.jpg", desc: "Chargeur original Samsung 65W PD avec 3 ports. Charge ultra rapide." },
      { id: 2, name: "Samsung 25W White", price: 50, img: "https://i.ibb.co/YyYhXzQ/white25w.jpg", desc: "Chargeur mural 25W original Samsung (Blanc). Super Fast Charging." },
      { id: 3, name: "Earbuds Crystal Pink", price: 95, img: "https://i.ibb.co/fNb9V1L/pinkearbuds.jpg", desc: "Design cristal unique, son haute fidélité et affichage LED." },
      { id: 4, name: "Samsung 25W Black", price: 50, img: "https://images.samsung.com/is/image/samsung/p6pim/fr/ep-ta800nbegeu/gallery/fr-wall-charger-for-super-fast-charging-25w-ep-ta800-ep-ta800nbegeu-530689938", desc: "Version Noir du chargeur 25W original Samsung." }
    ];

    let cart = [];

    function go(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
    }

    function toggleSidebar(s) {
      document.getElementById('sidebar').classList.toggle('open', s);
      document.querySelector('.overlay').classList.toggle('active', s);
    }

    function render(data = productsDB) {
      document.getElementById('products-grid').innerHTML = data.map(p => `
        <div class="product-card bg-white p-6 rounded-[30px] border border-gray-50 shadow-sm hover:shadow-xl transition cursor-pointer" onclick="showP(${p.id})">
          <img src="${p.img}" class="w-full h-48 object-contain mb-4" onerror="this.src='https://placehold.co/400x400/0071e3/ffffff?text=${p.name}'">
          <h3 class="font-black text-[10px] uppercase italic mb-2">${p.name}</h3>
          <p class="text-blue-600 font-black">${p.price} DH</p>
        </div>`).join('');
    }

    function showP(id) {
      const p = productsDB.find(x => x.id === id);
      document.getElementById('p-name').innerText = p.name;
      document.getElementById('p-desc').innerText = p.desc;
      document.getElementById('p-price').innerText = p.price + " DH";
      document.getElementById('p-img').src = p.img;
      document.getElementById('add-btn').onclick = () => { cart.push(p); updateCart(); showToast(); };
      go('details-view');
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }

    function search() {
      const val = document.getElementById('search-bar').value.toLowerCase();
      const filtered = productsDB.filter(p => p.name.toLowerCase().includes(val));
      render(filtered);
    }

    function updateCart() {
      document.getElementById('badge').innerText = cart.length;
      document.getElementById('badge').classList.toggle('hidden', cart.length === 0);
    }

    document.getElementById('contact-form').onsubmit = function(e) {
      e.preventDefault();
      document.getElementById('form-log').innerText = "ENVOI...";
      fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(this) })
      .then(r => r.json()).then(d => { if(d.success) { document.getElementById('form-log').innerText = "ENVOYÉ ✅"; this.reset(); } });
    };

    window.onload = () => render();
  </script>
</body>
</html>
