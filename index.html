<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP._.MAROC7 | المتجر الرسمي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #050a15; color: #e8e8ec; margin: 0; }
    .page-section { display: none; }
    .page-section.active { display: block !important; }
    .nav-glass { background: rgba(5, 10, 21, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,107,0,0.3); }
    .marquee { background: #FF6B00; color: white; padding: 10px; overflow: hidden; white-space: nowrap; font-weight: bold; }
    .marquee-content { display: inline-block; animation: scroll 20s linear infinite; }
    @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    .product-card { background: #0a1122; border: 1px solid #1a243a; border-radius: 20px; transition: 0.3s; }
  </style>
</head>
<body>

  <div class="marquee sticky top-0 z-[100]">
    <div class="marquee-content">🚀 توصيل سريع لكل المغرب — 🔌 شواحن سامسونج أصلية 100% — ⭐ ضمان الجودة من SHOP._.MAROC7</div>
  </div>

  <nav class="nav-glass sticky top-[44px] z-50 w-full">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div onclick="goTo('home')" class="flex items-center gap-3 cursor-pointer">
        <img src="https://i.ibb.co/3ykG8v8/WhatsApp-Image-2026-04-11-at-15-31-50.jpg" class="w-10 h-10 rounded border border-[#FF6B00]">
        <span class="text-xl font-black text-white">SHOP<span class="text-[#FF6B00]">._.</span>MAROC7</span>
      </div>
      <div class="hidden md:flex items-center gap-6 font-bold">
        <button onclick="goTo('home')" class="hover:text-[#FF6B00]">الرئيسية</button>
        <button onclick="goTo('products')" class="hover:text-[#FF6B00]">المنتجات</button>
        <button onclick="goTo('contact')" class="hover:text-[#FF6B00]">اتصل بنا</button>
      </div>
      <button onclick="openCart()" class="relative p-2 bg-white/5 rounded-lg border border-white/10">
        🛒 <span id="cart-badge" class="absolute -top-1 -right-1 bg-[#FF6B00] text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
      </button>
    </div>
  </nav>

  <main id="home" class="page-section active">
    <div class="max-w-7xl mx-auto px-4 pt-24 pb-20 text-center">
      <h1 class="text-5xl md:text-7xl font-black mb-8 leading-tight">الجودة الأصلية.<br><span class="text-[#FF6B00]">بأفضل الأثمان.</span></h1>
      <p class="text-gray-400 text-lg mb-10">متجرك الموثوق لإكسسوارات سامسونج الأصلية بالمغرب.</p>
      <button onclick="goTo('products')" class="bg-[#FF6B00] text-white px-12 py-4 rounded-xl font-bold text-lg hover:scale-105 transition">تسوق الآن</button>
    </div>
  </main>

  <main id="products" class="page-section">
    <div class="max-w-7xl mx-auto px-4 py-16">
      <h2 class="text-3xl font-bold mb-10 text-center">منتجاتنا</h2>
      <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>
  </main>

  <main id="contact" class="page-section">
    <div class="max-w-2xl mx-auto px-4 py-16 text-center">
      <h2 class="text-3xl font-bold mb-10 text-[#FF6B00]">تواصل معنا</h2>
      <div class="flex flex-col gap-4 mb-10">
        <a href="https://wa.me/212771737049" target="_blank" class="p-4 bg-[#25d366] text-white rounded-xl font-bold">واتساب: 0771737049</a>
        <a href="https://instagram.com/shop._.maroc7" target="_blank" class="p-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-xl font-bold">إنستغرام: @shop._.maroc7</a>
      </div>
      <form id="emailForm" class="bg-[#0a1122] p-8 rounded-2xl border border-white/10 text-right">
        <input type="hidden" name="access_key" value="83029047-dab7-46d7-a0fa-cde6ca83dd8b">
        <div class="space-y-4">
          <input type="text" name="name" placeholder="الاسم الكامل" required class="w-full p-4 rounded-lg bg-[#050a15] border border-white/10 text-white outline-none">
          <input type="email" name="email" placeholder="بريدك الإلكتروني" required class="w-full p-4 rounded-lg bg-[#050a15] border border-white/10 text-white outline-none">
          <textarea name="message" placeholder="رسالتك..." rows="4" required class="w-full p-4 rounded-lg bg-[#050a15] border border-white/10 text-white outline-none"></textarea>
          <button type="submit" class="w-full py-4 bg-[#FF6B00] text-white font-bold rounded-lg">إرسال للإيميل</button>
          <p id="res" class="text-center mt-3 font-bold"></p>
        </div>
      </form>
    </div>
  </main>

  <div id="cart" class="fixed top-0 left-0 h-full w-full sm:w-80 bg-[#050a15] z-[200] border-r border-white/10 transition-transform -translate-x-full p-6">
    <div class="flex justify-between items-center mb-8 font-bold"><span>سلة المشتريات</span><button onclick="closeCart()">&times;</button></div>
    <div id="items" class="space-y-4 mb-8 overflow-auto max-h-[60%]"></div>
    <div class="border-t border-white/10 pt-4">
      <div class="flex justify-between font-bold mb-6 text-[#FF6B00]"><span>المجموع:</span><span id="total">0 DH</span></div>
      <button onclick="orderWA()" class="w-full py-4 bg-[#25d366] text-white font-bold rounded-xl">طلب عبر واتساب</button>
    </div>
  </div>

  <script>
    const data = [
      { id: 1, name: "شاحن سامسونج 25W أصلي", price: 150, img: "https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400" },
      { id: 2, name: "سماعات Pink Buds Pro", price: 240, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" }
    ];
    let cart = [];

    // وظيفة التنقل
    function goTo(id) {
      document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
    }

    function render() {
      const g = document.getElementById('grid');
      g.innerHTML = data.map(p => `
        <div class="product-card p-5 text-right flex flex-col h-full">
          <img src="${p.img}" class="w-full h-48 object-cover rounded-xl mb-4">
          <h3 class="font-bold text-lg mb-2 text-white">${p.name}</h3>
          <div class="mt-auto flex justify-between items-center">
            <span class="text-xl font-bold text-[#FF6B00]">${p.price} DH</span>
            <button onclick="add(${p.id})" class="bg-[#FF6B00] text-white px-4 py-2 rounded-lg font-bold">أضف</button>
          </div>
        </div>`).join('');
    }

    function add(id) { cart.push(data.find(p => p.id === id)); update(); openCart(); }
    function update() {
      document.getElementById('cart-badge').textContent = cart.length;
      document.getElementById('cart-badge').classList.toggle('hidden', cart.length === 0);
      document.getElementById('total').textContent = cart.reduce((s,i) => s + i.price, 0) + " DH";
      document.getElementById('items').innerHTML = cart.map((i, idx) => `
        <div class="flex justify-between bg-white/5 p-3 rounded-lg text-sm"><span>${i.name}</span><button onclick="remove(${idx})" class="text-red-500">×</button></div>`).join('');
    }
    function remove(idx) { cart.splice(idx, 1); update(); }
    function openCart() { document.getElementById('cart').style.transform = 'translateX(0)'; }
    function closeCart() { document.getElementById('cart').style.transform = 'translateX(-100%)'; }
    function orderWA() { window.open("https://wa.me/212771737049?text=" + encodeURIComponent("طلب من SHOP._.MAROC7: " + cart.map(i=>i.name).join(' + '))); }

    document.getElementById('emailForm').onsubmit = function(e) {
      e.preventDefault();
      document.getElementById('res').innerText = "جاري الإرسال...";
      fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(this) })
      .then(r => r.json()).then(d => { if(d.success) { document.getElementById('res').innerText = "✅ تم الإرسال!"; this.reset(); } });
    };

    window.onload = render;
  </script>
</body>
</html>
